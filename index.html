<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>KEIZJECT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/src/hud/hud.css" />
</head>

<body>
  <!-- Three.js Canvas Container -->
  <div id="canvas-container" class="hidden"></div>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <div class="nav-logo">KEIZJECT</div>
    <div class="nav-links">
      <a href="#" class="nav-link" data-page="home">HOME</a>
      <a href="#" class="nav-link" data-page="characters">CHARACTERS</a>
      <a href="#" class="nav-link" data-page="loadouts">LOADOUTS</a>
    </div>
  </nav>

  <!-- Page: Home -->
  <div id="page-home" class="page"></div>

  <!-- Page: Characters (existing UI) -->
  <div id="page-characters" class="page">
    <!-- Character Cards Carousel - Left Side -->
    <div class="cards-carousel" id="cards-carousel">
      <!-- Generated by JS -->
    </div>

    <!-- Bottom Section -->
    <div class="bottom-section" id="bottom-section">
      <!-- Loadouts -->
      <div class="loadouts-section">
        <span class="section-label">LOADOUTS</span>
        <div class="loadout-icons">
          <div class="loadout-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 5h10v2H7V5zm0 4h10v2H7V9zm-3 8l3-3h10l3 3v2H4v-2z" />
            </svg>
          </div>
          <div class="loadout-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 5h10v2H7V5zm0 4h10v2H7V9zm-3 8l3-3h10l3 3v2H4v-2z" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Skills -->
      <div class="skills-section">
        <span class="section-label">SKILLS</span>
        <div class="skill-icons">
          <div class="skill-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2L4 7v10l8 5 8-5V7l-8-5zm0 2.5l5 3.1v6.8l-5 3.1-5-3.1V7.6l5-3.1z" />
            </svg>
          </div>
          <div class="skill-item active">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M13 3l4 8h5l-4 4 2 7-7-4-7 4 2-7-4-4h5l4-8z" />
            </svg>
          </div>
          <div class="skill-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93s3.05-7.44 7-7.93v15.86z" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button class="btn btn-primary" id="select-btn">SELECT</button>
        <button class="btn btn-secondary">CUSTOMIZE</button>
        <button class="btn btn-tertiary">BACK</button>
      </div>
    </div>
  </div>

  <!-- Page: Loadouts -->
  <div id="page-loadouts" class="page"></div>

  <!-- Page: Gameplay -->
  <div id="page-gameplay" class="page"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
